name: Post to Instagram

on:
  push:
    branches: [main]
    paths:
      - "images/**"
      - "videos/**"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: post-to-instagram
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Post new content to Instagram (story / reel)
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/post-new.js

      - name: Commit posted.json ledger
        if: always()
        run: |
          git config user.name "ig-auto-poster"
          git config user.email "actions@users.noreply.github.com"
          git add posted.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update posted.json ledger [skip ci]"
            git push
          fi
