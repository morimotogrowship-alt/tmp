name: Post to Instagram

on:
  schedule:
    - cron: "0 0 * * *"  # 09:00 JST
    - cron: "0 3 * * *"  # 12:00 JST
    - cron: "0 9 * * *"  # 18:00 JST
    - cron: "0 11 * * *" # 20:00 JST
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: post-to-instagram
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Post one item from the queue to Instagram (story / reel)
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/post-one.js

      - name: Commit ledger and remove posted item
        if: always()
        run: |
          git config user.name "ig-auto-poster"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "chore: post one item + update ledger [skip ci]"
            git push
          fi
